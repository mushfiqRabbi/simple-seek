services:
  simpleseek:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simpleseek-server
    ports:
      - "3001:3001"
    env_file:
      - server/.env
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      # Mount Pi's provider config so the pi --mode rpc subprocess
      # can find your LLM API keys (Gemini, OpenAI, etc.)
      # Pi also writes session files here, so it needs write access
      - ~/.pi:/root/.pi
    restart: unless-stopped
