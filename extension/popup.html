<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SimpleSeek</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 300px;
      padding: 16px;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    h1 {
      font-size: 18px;
      margin-bottom: 12px;
      color: #7c83ff;
    }
    .stats {
      font-size: 13px;
      color: #a0a0b0;
      margin-bottom: 16px;
    }
    .status {
      padding: 12px;
      border-radius: 8px;
      background: #16213e;
      font-size: 13px;
      line-height: 1.5;
    }
    .status .label {
      color: #7c83ff;
      font-weight: 600;
    }
    .status .value {
      color: #e0e0e0;
    }
    .footer {
      margin-top: 12px;
      font-size: 11px;
      color: #606080;
      text-align: center;
    }
    .error {
      color: #f44336;
    }
    .loading {
      color: #ffa500;
    }
  </style>
</head>
<body>
  <h1>🔍 SimpleSeek</h1>
  <div class="stats" id="stats">Loading...</div>
  <div class="status" id="status">
    <span class="label">Tip:</span>
    <span class="value">Right-click on any job page → SimpleSeek → Duplication Check</span>
  </div>
  <div class="footer">SimpleSeek v0.1.0</div>

  <script src="popup.js"></script>
</body>
</html>
